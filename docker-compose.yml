services:
  redis:
    image: redis:7-alpine
    container_name: redis
    env_file: .env
    command: >
      redis-server
      --port ${REDIS_PORT:-6379}
      --bind 0.0.0.0
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory ${REDIS_MAXMEMORY:-2gb}
      --maxmemory-policy allkeys-lru
      --maxclients ${REDIS_MAXCLIENTS:-10000}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --tcp-keepalive 300
      --timeout 0
      --protected-mode no
      --loglevel notice
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-3G}
        reservations:
          memory: ${REDIS_MEMORY_RESERVATION:-1G}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    driver: local
